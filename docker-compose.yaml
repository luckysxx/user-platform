services:
  user-http:
    container_name: user-http
    build:
      context: .
      dockerfile: Dockerfile.http
    ports:
      - "8081:8081"
    environment:
      - APP_ENV=${APP_ENV:-development}
      - SERVER_PORT=8081
      - DATABASE_AUTO_MIGRATE=${DB_AUTO_MIGRATE:-true}
      - DATABASE_SOURCE=postgres://luckys:123456@global-postgres:5432/user_platform?sslmode=disable
      - REDIS_ADDR=global-redis:6379
      - JWT_SECRET=user_platform_secret_key
      - KAFKA_BROKERS=global-kafka:9092
      - KAFKA_TOPIC_USER_REGISTERED=user.registered
      - ID_GENERATOR_ADDR=id-generator:50059
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8081/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - go-net
    restart: unless-stopped

  user-grpc:
    container_name: user-grpc
    build:
      context: .
      dockerfile: Dockerfile.grpc
    ports:
      - "9091:9091"
    environment:
      - APP_ENV=${APP_ENV:-development}
      - USER_GRPC_PORT=9091
      - DATABASE_AUTO_MIGRATE=false
      - DATABASE_SOURCE=postgres://luckys:123456@global-postgres:5432/user_platform?sslmode=disable
      - REDIS_ADDR=global-redis:6379
      - JWT_SECRET=user_platform_secret_key
      - KAFKA_BROKERS=global-kafka:9092
      - KAFKA_TOPIC_USER_REGISTERED=user.registered
      - ID_GENERATOR_ADDR=id-generator:50059
    networks:
      - go-net
    restart: unless-stopped

networks:
  go-net:
    name: go-net
    external: true