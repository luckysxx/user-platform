server:
  http_listen_port: 9080

positions:
  filename: /tmp/positions.yaml    # 记录读取位置

clients:
  - url: http://loki:3100/loki/api/v1/push    # 发送到 Loki

scrape_configs:
  # 采集 Docker 容器日志
  - job_name: docker
    static_configs:
      - targets:
          - localhost
        labels:
          job: docker
          __path__: /var/lib/docker/containers/*/*-json.log
    pipeline_stages:
      - json:
          expressions:
            output: log
            stream: stream
      - output:
          source: output