services:
  postgres:
    image: postgres:15-alpine
    container_name: user-platform-postgres
    restart: always
    environment:
      POSTGRES_USER: luckys
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: user_platform
      PGDATA: /var/lib/postgresql/data/pgdata
      TZ: Asia/Shanghai
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U luckys -h localhost -p 5432"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - ./pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - platform-internal

  redis:
    image: redis:alpine
    container_name: user-platform-redis
    restart: always 
    command: redis-server --appendonly yes --requirepass "123456"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "123456", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - ./redis_data:/data
    networks:
      - platform-internal

  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: user-platform-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    restart: unless-stopped
    networks:
      - platform-internal

  grafana:
    image: grafana/grafana:10.1.0
    container_name: user-platform-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=luckys
      - GF_SECURITY_ADMIN_PASSWORD=123456
    volumes:
      - grafana_data:/var/lib/grafana
    restart: unless-stopped
    networks:
      - platform-internal

  loki:
    image: grafana/loki:2.9.0
    container_name: user-platform-loki
    ports:
      - "3100:3100"
    volumes:
      - ./loki/loki.yml:/etc/loki/local-config.yaml
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped
    networks:
      - platform-internal

  promtail:
    image: grafana/promtail:2.9.0
    container_name: user-platform-promtail
    volumes:
      - ./promtail/promtail.yml:/etc/promtail/config.yml
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/log:/var/log:ro
    command: -config.file=/etc/promtail/config.yml
    restart: unless-stopped
    networks:
      - platform-internal

volumes:
  redis_data:
  prometheus_data:
  grafana_data:
  loki_data:

networks:
  platform-internal:
    name: platform-internal
    external: true